<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubernetes Cluster Info</title>
</head>
<body>
    <h1>Kubernetes Cluster Information</h1>

    <h2>Cluster</h2>
    <p>API Version: {{ data.cluster.api_version }}</p>
    <p>Platform: {{ data.cluster.platform }}</p>

    <h2>Nodes</h2>
    <ul>
        {% for node in data.nodes %}
        <li>
            <strong>{{ node.name }}</strong>: CPU {{ node.cpu_capacity }},
            Memory {{ node.memory_capacity }}, Kubelet Version {{ node.kubelet_version }},
            Roles: {{ node.roles }}
        </li>
        {% endfor %}
    </ul>

    <h2>Pods</h2>
    <p>Total Pods: {{ data.pods.total_pods }}</p>
    <ul>
        {% for ns, count in data.pods.pods_by_namespace.items() %}
        <li>Namespace {{ ns }}: {{ count }} Pods</li>
        {% endfor %}
    </ul>

    <h2>Persistent Volumes</h2>
    <ul>
        {% for pv in data.pvs %}
        <li>
            <strong>{{ pv.name }}</strong>: {{ pv.capacity }}, Access Modes: {{ pv.access_modes }},
            Status: {{ pv.status }}
        </li>
        {% endfor %}
    </ul>

    <h2>Deployments</h2>
    <p>Total Deployments: {{ data.deployments.total_deployments }}</p>
</body>
</html>
